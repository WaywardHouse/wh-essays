<!-- Wayward House — essay viz + narrative loader
     Loads the main viz scanner (core.js: ECharts, Mapbox, Leaflet) and the
     essay-specific runtime (essay/core.js: Scrollama, sidenotes, progress).
     Uses the site_libs anchor to compute the correct root-relative path so
     this works both on the direct *.pages.dev domain and through the hub proxy. -->
<script>
(function () {
  var anchor = document.querySelector('script[src*="site_libs/"]');
  if (!anchor) return;
  var base = anchor.getAttribute('src').replace(/site_libs\/.*$/, '');

  function loadModule(path) {
    var s = document.createElement('script');
    s.type = 'module';
    s.src = base + path;
    document.head.appendChild(s);
  }

  loadModule('assets/js/core.js');        // ECharts, Mapbox, Leaflet, D3
  loadModule('assets/js/essay/core.js');  // Scrollama, sidenotes, progress
})();
</script>
