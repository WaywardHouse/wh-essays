<!-- Wayward House — essay ECharts auto-initialiser
     Fires only when [data-viz="echarts"] elements are present.
     Loads ECharts from CDN, then calls setOption on every data-viz div. -->
<script>
(function () {
  if (!document.querySelector('[data-viz="echarts"]')) return;

  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js';
  s.onload = function () {
    document.querySelectorAll('[data-viz="echarts"][data-options]').forEach(function (el) {
      try {
        var opts = JSON.parse(el.getAttribute('data-options'));
        var chart = echarts.init(el, null, { renderer: 'svg' });
        chart.setOption(opts);
        // Resize on window resize
        window.addEventListener('resize', function () { chart.resize(); }, { passive: true });
      } catch (e) {
        console.warn('ECharts init failed for element', el, e);
      }
    });
  };
  document.head.appendChild(s);
})();
</script>
