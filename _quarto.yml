project:
  type: website
  output-dir: _site

website:
  title: "Wayward House"
  site-url: "https://wayward.house/essays"
  description: "Long-form writing on place, economy, and environment. Each essay is built to be re-read, not skimmed."
  navbar:
    left:
      - href: index.qmd
        text: All Essays
    right:
      - text: "↩ Wayward House"
        href: "https://wayward.house"
  page-navigation: false
  back-to-top-navigation: true
  search:
    location: navbar
    type: textbox

format:
  WaywardHouse/waywardhouse-book-html:
    toc: true
    toc-depth: 3
    include-after-body:
      - assets/includes/echarts-init.html

execute:
  freeze: auto
